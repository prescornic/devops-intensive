version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: colorsdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d colorsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
  
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: ./backend
    image: demo-backend
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "3000"
    networks:
      - frontend-network
      - backend-network
  
  frontend:
    build:
      context: ./frontend
    image: demo-frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "80"
    networks:
      - frontend-network
  
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend-network
      - backend-network

volumes:
  postgres-data:
  redis-data:

networks:
  frontend-network:
  backend-network:
  