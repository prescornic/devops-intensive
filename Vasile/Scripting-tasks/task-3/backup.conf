# Detect project root dynamically (Relative to where this config lives)
PROJECT_ROOT="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"

# --- Source and Destination ---
# Default source to backup (e.g., a 'data' folder in the project)
SOURCE_DIR="$PROJECT_ROOT/data"

# Local storage for archives
LOCAL_BACKUP_DIR="$PROJECT_ROOT/backups"

# --- Remote Settings (specific backup server need to be specified) ---
REMOTE_USER="backup_user"
REMOTE_HOST="192.168.1.100"
REMOTE_DEST="/home/backup_user/remote_storage"

# --- Retention and Logging ---
RETENTION_DAYS=7
LOG_FILE="$PROJECT_ROOT/logs/backup.log"

# SSH settings (for remote backups)
SSH_KEY_PATH="$HOME/.ssh/id_rsa"
SSH_PORT=22