services:
  postgres:
    image: postgres:16-alpine
    container_name: task4-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpass
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  nginx:
    image: nginx:alpine
    container_name: task4-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro

  tmpfs-demo:
    image: alpine:3.20
    container_name: task4-tmpfs
    command: sh -c "mkdir -p /tmp/cache && echo 'temporary-data' > /tmp/cache/data.txt && sleep 3600"
    tmpfs:
      - /tmp/cache

  writer:
    image: alpine:3.20
    container_name: task4-writer
    command: sh -c "mkdir -p /shared && echo 'Hello from writer container' > /shared/message.txt && sleep 3600"
    volumes:
      - shared_data:/shared

  reader:
    image: alpine:3.20
    container_name: task4-reader
    command: sh -c "sleep 3600"
    volumes:
      - shared_data:/shared

volumes:
  postgres_data:
  shared_data: