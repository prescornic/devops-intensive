services:
  secure-app:
    build:
      context: .
      dockerfile: Dockerfile.secure
    image: secure-app:1.0.0
    ports:
      - "8080:8080"
    environment:
      APP_SECRET_FILE: /run/secrets/app_secret
    secrets:
      - app_secret
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

secrets:
  app_secret:
    file: ./secrets/app_secret.txt